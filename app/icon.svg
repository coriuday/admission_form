<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer navy ring -->
  <circle cx="50" cy="50" r="48" fill="#1a3a6b" />
  <!-- White inner border ring -->
  <circle cx="50" cy="50" r="43" fill="white" />
  <!-- Inner cream background -->
  <circle cx="50" cy="50" r="38" fill="#fdf8f0" />

  <!-- Sun / rising rays (orange-red) centered slightly above middle -->
  <g transform="translate(50, 46)">
    <!-- Central sun circle -->
    <circle cx="0" cy="0" r="9" fill="#e8401a" />
    <!-- Rays -->
    <line x1="0" y1="-13" x2="0" y2="-18" stroke="#e8401a" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="9.2" y1="-9.2" x2="12.7" y2="-12.7" stroke="#e8401a" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="13" y1="0" x2="18" y2="0" stroke="#e8401a" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="9.2" y1="9.2" x2="12.7" y2="12.7" stroke="#e8401a" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="13" x2="0" y2="18" stroke="#e8401a" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-9.2" y1="9.2" x2="-12.7" y2="12.7" stroke="#e8401a" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-13" y1="0" x2="-18" y2="0" stroke="#e8401a" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-9.2" y1="-9.2" x2="-12.7" y2="-12.7" stroke="#e8401a" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Open book at bottom (navy blue) -->
  <path d="M 22 70 Q 50 62 78 70 L 78 80 Q 50 72 22 80 Z" fill="#1a3a6b" />
  <line x1="50" y1="62" x2="50" y2="80" stroke="#1a3a6b" stroke-width="1.5"/>

  <!-- Outer ring text arc: GURU NANAK UNIVERSITY top -->
  <defs>
    <path id="topArc" d="M 10,50 A 40,40 0 1,1 90,50" />
    <path id="bottomArc" d="M 16,58 A 36,36 0 0,0 84,58" />
  </defs>
  <text font-family="Arial, sans-serif" font-weight="bold" font-size="7.5" fill="white" letter-spacing="1.5">
    <textPath href="#topArc" startOffset="8%">GURU NANAK UNIVERSITY</textPath>
  </text>
  <text font-family="Arial, sans-serif" font-weight="bold" font-size="7" fill="white" letter-spacing="2">
    <textPath href="#bottomArc" startOffset="15%">HYDERABAD</textPath>
  </text>

  <!-- GNU bold label in center -->
  <text x="50" y="52" font-family="Arial Black, sans-serif" font-weight="900" font-size="10" fill="#1a3a6b" text-anchor="middle" dominant-baseline="middle">GNU</text>
</svg>
