<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Enquiry | GNU Hyderabad</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Background Animation -->
    <div class="background-container">
        <div class="mesh-grid"></div>
    </div>

    <main class="main-content">
        <div class="form-card">
            <!-- Logo Strip -->
            <div class="logo-strip">
                <img src="logo.png" alt="GNU Hyderabad Logo" class="logo">
            </div>

            <!-- Banner Header -->
            <header class="form-header">
                <div class="header-content">
                    <i data-lucide="graduation-cap" class="header-icon"></i>
                    <h1>Admission Enquiry</h1>
                    <p>Take the first step towards your future. Fill out the form below and our team will get in touch with you.</p>
                </div>
            </header>

            <!-- Form -->
            <div class="form-body">
                <form id="admissionForm">
                    <div id="successMessage" class="hidden success-container">
                        <div class="success-icon-wrapper">
                            <i data-lucide="check-circle" class="success-icon"></i>
                        </div>
                        <h2>Enquiry Submitted!</h2>
                        <p>Thank you for your interest. We will contact you shortly.</p>
                    </div>

                    <div id="formFields" class="form-fields">
                        <div class="grid-row">
                            <div class="field-group">
                                <label for="name"><i data-lucide="user"></i> Full Name</label>
                                <input type="text" id="name" name="name" placeholder="John Doe" required>
                                <span class="error" id="nameError"></span>
                            </div>
                            <div class="field-group">
                                <label for="email"><i data-lucide="mail"></i> Email Address</label>
                                <input type="email" id="email" name="email" placeholder="john@example.com" required>
                                <span class="error" id="emailError"></span>
                            </div>
                        </div>

                        <div class="grid-row">
                            <div class="field-group">
                                <label><i data-lucide="phone"></i> Phone Number</label>
                                <div class="phone-input-group">
                                    <input type="text" id="phoneCode" name="phoneCode" value="+91" class="phone-code">
                                    <input type="tel" id="phone" name="phone" placeholder="9876543210" required>
                                </div>
                                <span class="error" id="phoneError"></span>
                            </div>
                            <div class="field-group">
                                <label for="course"><i data-lucide="graduation-cap"></i> Select Course</label>
                                <select id="course" name="course" required>
                                    <option value="">Choose a course...</option>
                                    <!-- Populated by script.js -->
                                </select>
                                <span class="error" id="courseError"></span>
                            </div>
                        </div>

                        <div class="grid-row">
                            <div class="field-group">
                                <label for="country"><i data-lucide="globe"></i> Select Country</label>
                                <select id="country" name="country" required>
                                    <option value="">Choose a country...</option>
                                    <!-- Populated by script.js -->
                                </select>
                                <span class="error" id="countryError"></span>
                            </div>
                            <div class="field-group">
                                <label for="state"><i data-lucide="map-pin"></i> Select State</label>
                                <select id="state" name="state" disabled>
                                    <option value="">Choose a state...</option>
                                    <!-- Populated by script.js -->
                                </select>
                                <span class="error" id="stateError"></span>
                            </div>
                        </div>

                        <div class="field-group">
                            <label for="educationDetails"><i data-lucide="book"></i> Previous Education Details</label>
                            <textarea id="educationDetails" name="educationDetails" rows="3" placeholder="E.g. Completed High School (10+2) in 2025 with 85% aggregate..." required></textarea>
                            <span class="error" id="educationDetailsError"></span>
                        </div>

                        <div class="form-actions">
                            <button type="button" id="clearBtn" class="btn-clear">
                                <i data-lucide="rotate-ccw"></i> Clear
                            </button>
                            <button type="submit" id="submitBtn" class="btn-submit">
                                <span>Submit Enquiry</span>
                                <i data-lucide="chevron-right"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
